services:

  backend:
    build: ./backend
    container_name: restaurant_backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: restaurant_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend